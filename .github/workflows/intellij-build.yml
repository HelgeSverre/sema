# Build, test, and verify the Sema IntelliJ plugin.
#
# Scoped to the editors/intellij/ subtree of the monorepo via path filters, so it does not run on
# unrelated (Rust) changes. Does NOT create GitHub Releases or tags — publishing is handled
# separately by intellij-release.yml (manual dispatch) to avoid colliding with the cargo-dist
# release workflow that owns numeric version tags.

name: IntelliJ Build

on:
  push:
    branches: [main]
    paths:
      - 'editors/intellij/**'
      - '.github/workflows/intellij-build.yml'
  pull_request:
    paths:
      - 'editors/intellij/**'
      - '.github/workflows/intellij-build.yml'

concurrency:
  group: intellij-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: editors/intellij

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build plugin
        run: ./gradlew buildPlugin
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: editors/intellij/build/distributions/*.zip

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
      - name: Run tests
        run: ./gradlew check
      - name: Collect test results
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: tests-result
          path: editors/intellij/build/reports/tests

  verify:
    name: Verify plugin
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v7
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true
      - name: Run plugin verification
        run: ./gradlew verifyPlugin
      - name: Collect verifier result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pluginVerifier-result
          path: editors/intellij/build/reports/pluginVerifier
