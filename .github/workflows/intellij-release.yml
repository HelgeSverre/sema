# Sign and publish the Sema IntelliJ plugin to the JetBrains Marketplace.
#
# Manually dispatched (workflow_dispatch) rather than release/tag-driven: this is a monorepo, and the
# shared cargo-dist release workflow (release.yml) triggers on any tag matching
# `**[0-9]+.[0-9]+.[0-9]+*`. A version-tag-driven publish here would cross-trigger a Rust release, so
# this workflow creates no tags and no GitHub Releases.
#
# Requires four repository secrets: PUBLISH_TOKEN, PRIVATE_KEY, PRIVATE_KEY_PASSWORD,
# CERTIFICATE_CHAIN. See editors/intellij/RELEASING.md and
# https://plugins.jetbrains.com/docs/intellij/plugin-signing.html

name: IntelliJ Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Sign and upload the ZIP as an artifact only (do not publish to Marketplace)'
        type: boolean
        default: false

defaults:
  run:
    working-directory: editors/intellij

jobs:
  release:
    name: Publish plugin
    runs-on: ubuntu-latest
    steps:
      - name: Fetch sources
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Sign plugin (dry run)
        if: ${{ inputs.dry_run }}
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin

      - name: Publish plugin
        if: ${{ !inputs.dry_run }}
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-plugin-distribution
          path: editors/intellij/build/distributions/*-signed.zip
