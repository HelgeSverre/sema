# Publish everything for a release when a version tag is pushed: all crates to
# crates.io AND the npm packages. Both publishes share a SINGLE verify gate, so
# the full test/lint/examples suite runs once per release — not once per registry.
#
# Usage:
#   1. Bump the version in Cargo.toml (workspace.package.version + dependency pins)
#   2. Commit and push
#   3. Tag and push:  git tag v1.6.2 && git push origin v1.6.2
#
# Recover a partially-failed publish:  re-run via workflow_dispatch against main
# (the crates step is idempotent; npm publishes skip "already published").
#
# Setup:
#   crates.io API token   -> secret CARGO_REGISTRY_TOKEN
#   npm uses Trusted Publishing (OIDC) — no token needed.

name: Publish (crates.io + npm)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # allow re-running a partially-failed publish against main

jobs:
  # Single gate shared by BOTH publishes below. A red suite blocks the release.
  verify:
    uses: ./.github/workflows/verify.yml

  publish-crates:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      # sema-stdlib pulls in serialport -> libudev-sys, whose `cargo publish`
      # verify-build needs libudev. Without this the last three crates fail to
      # publish (and the old loop masked it as "already published").
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -e

          # Idempotent: skip crates already on crates.io, but FAIL LOUDLY on any
          # other error (a real publish failure must not look like success).
          # `cargo publish` already blocks until the new version is available on
          # the index, so we only add a tiny buffer before the next crate.
          publish() {
            echo "Publishing $1..."
            out=$(cargo publish -p "$1" 2>&1) && { echo "$out"; sleep 5; return 0; }
            if echo "$out" | grep -qiE "already (uploaded|exists)"; then
              echo "$1 already published, skipping"
            else
              echo "$out"
              echo "::error::Publishing $1 failed"
              exit 1
            fi
          }

          # Dependency order: a crate's path-deps must already be on crates.io.
          publish sema-core
          publish sema-reader
          publish sema-vm
          publish sema-otel
          publish sema-llm
          publish sema-stdlib
          publish sema-eval
          publish sema-docs
          publish sema-fmt
          publish sema-dap
          publish sema-notebook
          publish sema-lsp
          publish sema-mcp
          publish sema-lang

  publish-npm:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v6
        with:
          # Node 24 bundles npm 11.x — supports `--provenance` and trusted
          # publishing. Earlier runner images (Node 22.22.2) shipped a
          # corrupted bundled npm whose `arborist` was missing `promise-retry`,
          # making both `npm install -g npm@latest` and `npm publish` fail.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm is functional
        run: |
          node --version
          npm --version

      - name: Determine version
        id: version
        run: |
          # On a tag push, use the tag; on workflow_dispatch (recovery) read the
          # workspace version from Cargo.toml so npm can be re-published too.
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            v=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
            echo "version=$v" >> "$GITHUB_OUTPUT"
          fi

      - name: Build WASM package
        run: |
          wasm-pack build crates/sema-wasm \
            --target web \
            --release \
            --scope sema-lang \
            --out-dir ../../packages/sema-wasm/pkg

      - name: Prepare sema-wasm package
        working-directory: packages/sema-wasm/pkg
        run: |
          # wasm-pack generates package.json; update version to match tag
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          # Copy README
          cp ../README.md .

      - name: Publish @sema-lang/sema-wasm
        working-directory: packages/sema-wasm/pkg
        run: npm publish --provenance --access public || echo "Already published, skipping"

      - name: Wait for npm registry propagation
        run: |
          echo "Waiting for @sema-lang/sema-wasm@${{ steps.version.outputs.version }} to propagate..."
          for i in $(seq 1 30); do
            if npm view "@sema-lang/sema-wasm@${{ steps.version.outputs.version }}" version 2>/dev/null; then
              echo "Package available on registry"
              exit 0
            fi
            echo "Attempt $i/30 - not yet available, waiting 10s..."
            sleep 10
          done
          echo "Package not found after 5 minutes"
          exit 1

      - name: Build wrapper package
        working-directory: packages/sema
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version
          # Update dependency version to match
          node -e "
            const pkg = require('./package.json');
            pkg.dependencies['@sema-lang/sema-wasm'] = '^${{ steps.version.outputs.version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm install
          npm run build

      - name: Publish @sema-lang/sema
        working-directory: packages/sema
        run: npm publish --provenance --access public || echo "Already published, skipping"
